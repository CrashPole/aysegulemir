<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayşegül & Emir Kaan — 20.06.2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="config.js"></script>

  <style>
    :root {
      --bg:          #faf8f3;
      --bg-alt:      #f1ece0;
      --card-bg:     #ffffff;
      --text:        #1c1c1c;
      --text-muted:  #7a7466;
      --accent:      #8a7a5c;
      --accent-dark: #6a5d44;
      --border:      rgba(28, 28, 28, 0.10);
      --border-soft: rgba(28, 28, 28, 0.06);
      --header-h:    76px;
      --ease:        0.4s cubic-bezier(0.22, 1, 0.36, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    section { scroll-margin-top: var(--header-h); }
    img, svg { display: block; max-width: 100%; }

    .serif { font-family: 'Cormorant Garamond', serif; font-weight: 400; }
    .italic { font-style: italic; }

    .eyebrow {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.32em;
      color: var(--text-muted);
      font-weight: 500;
    }

    .section-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.32em;
      color: var(--accent);
      font-weight: 500;
      text-align: center;
      display: block;
      margin-bottom: 1.2rem;
    }

    .section-heading {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.5rem, 5.5vw, 3.8rem);
      color: var(--text);
      text-align: center;
      line-height: 1.1;
      letter-spacing: -0.01em;
      margin-bottom: 0.6rem;
    }
    .section-heading em {
      font-style: italic;
      color: var(--accent);
      font-weight: 300;
    }

    .section-sub {
      text-align: center;
      font-size: 0.95rem;
      color: var(--text-muted);
      max-width: 540px;
      margin: 0 auto 4.5rem;
      line-height: 1.7;
      font-style: italic;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
    }

    .rule {
      width: 1px;
      height: 56px;
      background: var(--border);
      margin: 0 auto 2.4rem;
    }

    section { padding: 120px 0; position: relative; }
    .container { width: min(1120px, 90vw); margin: 0 auto; }
    .alt-bg { background: var(--bg-alt); }

    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.9s var(--ease), transform 0.9s var(--ease);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.08s; }
    .reveal-d2 { transition-delay: 0.18s; }
    .reveal-d3 { transition-delay: 0.28s; }
    .reveal-d4 { transition-delay: 0.38s; }

    /* ============================================================
       HEADER
       ============================================================ */
    .site-header {
      position: fixed;
      inset-block-start: 0;
      inset-inline: 0;
      height: var(--header-h);
      z-index: 1000;
      background: rgba(250, 248, 243, 0.88);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-soft);
      transition: background var(--ease);
    }
    .header-inner {
      width: min(1200px, 94vw);
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .header-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 400;
      letter-spacing: 0.2em;
      color: var(--text);
      flex-shrink: 0;
    }

    .site-nav { display: flex; align-items: center; gap: 2.6rem; }
    .site-nav a {
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      transition: color var(--ease);
      position: relative;
    }
    .site-nav a::after {
      content: '';
      position: absolute;
      bottom: -6px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width var(--ease);
    }
    .site-nav a:hover { color: var(--text); }
    .site-nav a:hover::after { width: 100%; }

    .header-right { display: flex; align-items: center; gap: 1.2rem; }

    .lang-toggle {
      display: flex;
      align-items: center;
      gap: 0;
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--text-muted);
    }
    .lang-btn {
      padding: 4px 8px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-family: inherit;
      font-size: inherit;
      font-weight: inherit;
      letter-spacing: inherit;
      text-transform: uppercase;
      transition: color var(--ease);
    }
    .lang-btn.active { color: var(--text); font-weight: 600; }
    .lang-btn:hover { color: var(--text); }
    .lang-sep { color: var(--border); user-select: none; }

    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1px;
      background: var(--text);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-6px) rotate(-45deg); }

    .mobile-nav {
      display: none;
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: rgba(250, 248, 243, 0.98);
      backdrop-filter: blur(16px);
      padding: 2.5rem 2rem 3rem;
      z-index: 999;
      flex-direction: column;
      align-items: center;
      gap: 1.8rem;
      border-bottom: 1px solid var(--border-soft);
      transform: translateY(-8px);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .mobile-nav.open {
      display: flex;
      opacity: 1;
      transform: translateY(0);
      pointer-events: all;
    }
    .mobile-nav a {
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: var(--text-muted);
      transition: color var(--ease);
    }
    .mobile-nav a:hover { color: var(--text); }

    /* ============================================================
       HERO
       ============================================================ */
    #hero {
      position: relative;
      min-height: 100svh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 0;
      scroll-margin-top: 0;
      background:
        radial-gradient(ellipse 70% 50% at 50% 100%, rgba(138, 122, 92, 0.08), transparent 70%),
        radial-gradient(ellipse 90% 60% at 50% 0%, rgba(241, 236, 224, 0.6), transparent 65%),
        var(--bg);
    }

    .hero-mark {
      position: absolute;
      top: calc(var(--header-h) + 40px);
      left: 50%;
      transform: translateX(-50%);
      width: 38px;
      height: 1px;
      background: var(--accent);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.6rem;
      padding: 0 1.5rem;
      animation: heroFadeIn 1.4s ease forwards;
    }
    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .hero-eyebrow {
      text-transform: uppercase;
      letter-spacing: 0.42em;
      font-size: 0.66rem;
      color: var(--accent);
      font-weight: 500;
    }
    .hero-names {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(3.6rem, 11vw, 8rem);
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -0.015em;
      color: var(--text);
    }
    .hero-amp {
      font-style: italic;
      color: var(--accent);
      font-weight: 300;
    }
    .hero-meta {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      margin-top: 1.2rem;
    }
    .hero-meta::before {
      content: '';
      display: block;
      width: 48px;
      height: 1px;
      background: var(--accent);
      opacity: 0.6;
      margin-bottom: 0.4rem;
    }
    .hero-date {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.1rem, 1.8vw, 1.4rem);
      letter-spacing: 0.32em;
      color: var(--text);
      font-weight: 400;
      line-height: 1;
    }
    .hero-location {
      font-size: 0.66rem;
      letter-spacing: 0.32em;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 500;
      line-height: 1;
    }

    .scroll-cue {
      position: absolute;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.28em;
    }
    .scroll-cue-line {
      width: 1px;
      height: 44px;
      background: linear-gradient(to bottom, var(--accent), transparent);
      animation: scrollPulse 2.4s ease-in-out infinite;
      transform-origin: top;
    }
    @keyframes scrollPulse {
      0%, 100% { transform: scaleY(0.4); opacity: 0.4; }
      50%       { transform: scaleY(1);   opacity: 1; }
    }

    /* ============================================================
       COUNTDOWN
       ============================================================ */
    .countdown-wrap {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      max-width: 640px;
      margin: 0 auto 5rem;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
    }
    .cd-unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 2.2rem 0.8rem;
      position: relative;
    }
    .cd-unit + .cd-unit::before {
      content: '';
      position: absolute;
      left: 0;
      top: 18%;
      bottom: 18%;
      width: 1px;
      background: var(--border);
    }
    .cd-number {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 6vw, 4rem);
      color: var(--text);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .cd-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: var(--text-muted);
      font-weight: 500;
    }

    /* Timeline */
    .timeline-wrap {
      max-width: 600px;
      margin: 0 auto;
    }
    .tl-item {
      display: grid;
      grid-template-columns: 110px 1fr;
      gap: 2rem;
      padding: 2rem 0;
      border-top: 1px solid var(--border-soft);
      align-items: baseline;
    }
    .tl-item:last-child { border-bottom: 1px solid var(--border-soft); }
    .tl-time {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--accent);
      letter-spacing: 0.04em;
    }
    .tl-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--text);
      line-height: 1.2;
      margin-bottom: 0.5rem;
      font-weight: 400;
    }
    .tl-desc {
      font-size: 0.86rem;
      color: var(--text-muted);
      line-height: 1.7;
    }

    /* ============================================================
       GETTING THERE
       ============================================================ */
    .dir-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.4rem;
      margin-bottom: 2.8rem;
    }
    .dir-card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      padding: 2.6rem 2.2rem;
      transition: border-color var(--ease), transform var(--ease);
    }
    .dir-card:hover {
      border-color: var(--accent);
      transform: translateY(-3px);
    }
    .dir-icon {
      width: 32px;
      height: 32px;
      margin-bottom: 1.4rem;
      color: var(--accent);
    }
    .dir-icon svg { width: 100%; height: 100%; stroke: currentColor; fill: none; stroke-width: 1.2; }
    .dir-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      color: var(--text);
      margin-bottom: 0.8rem;
      font-weight: 400;
    }
    .dir-text {
      font-size: 0.88rem;
      color: var(--text-muted);
      line-height: 1.75;
    }

    .map-embed {
      width: 100%;
      height: 400px;
      border: 1px solid var(--border-soft);
      overflow: hidden;
      background: var(--card-bg);
    }
    .map-embed iframe {
      display: block;
      width: 100%;
      height: 100%;
      filter: grayscale(0.18) contrast(0.96);
    }
    .map-action {
      text-align: center;
      margin-top: 1.8rem;
    }

    /* ============================================================
       ACCOMMODATION
       ============================================================ */
    .hotel-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.6rem;
    }
    .hotel-card {
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      display: flex;
      flex-direction: column;
      transition: border-color var(--ease), transform var(--ease), box-shadow var(--ease);
    }
    .hotel-card:hover {
      border-color: var(--accent);
      transform: translateY(-4px);
      box-shadow: 0 24px 50px -28px rgba(28, 28, 28, 0.18);
    }
    .hotel-thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      padding: 1.4rem;
    }
    .hotel-thumb-1 { background: linear-gradient(135deg, #d8d3c4 0%, #a8a08c 100%); }
    .hotel-thumb-2 { background: linear-gradient(135deg, #cdd1bf 0%, #8a9479 100%); }
    .hotel-thumb-3 { background: linear-gradient(135deg, #d8c9b8 0%, #a8957a 100%); }
    .hotel-tag {
      font-size: 0.58rem;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.92);
      font-weight: 500;
      background: rgba(28,28,28,0.18);
      padding: 5px 10px;
      backdrop-filter: blur(6px);
    }
    .hotel-body {
      padding: 1.8rem 1.6rem 1.8rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      flex-grow: 1;
    }
    .hotel-stars {
      color: var(--accent);
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      margin-bottom: 0.2rem;
    }
    .hotel-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.55rem;
      color: var(--text);
      line-height: 1.2;
      font-weight: 400;
    }
    .hotel-loc {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--text-muted);
      margin-bottom: 0.6rem;
    }
    .hotel-desc {
      font-size: 0.82rem;
      color: var(--text-muted);
      line-height: 1.7;
      flex-grow: 1;
    }
    .hotel-price {
      font-family: 'Cormorant Garamond', serif;
      font-size: 0.95rem;
      color: var(--text);
      font-style: italic;
      margin-top: 0.4rem;
    }
    .hotel-card .btn { margin-top: 1.2rem; }

    /* ============================================================
       BUTTONS
       ============================================================ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 14px 28px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      cursor: pointer;
      border: 1px solid var(--text);
      background: transparent;
      color: var(--text);
      transition: background var(--ease), color var(--ease), border-color var(--ease);
    }
    .btn:hover { background: var(--text); color: var(--bg); }

    .btn-filled {
      background: var(--text);
      color: var(--bg);
    }
    .btn-filled:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-outline { border-color: var(--border); color: var(--text); }
    .btn-outline:hover { background: var(--text); color: var(--bg); border-color: var(--text); }

    .btn-block { width: 100%; }
    .btn-lg { padding: 16px 36px; }

    /* ============================================================
       GIFT / IBAN
       ============================================================ */
    .gift-card {
      max-width: 620px;
      margin: 0 auto;
      background: var(--card-bg);
      border: 1px solid var(--border-soft);
      padding: 3rem 2.6rem;
      text-align: center;
    }
    .gift-presence {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-style: italic;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 2rem;
    }
    .gift-rule {
      width: 44px;
      height: 1px;
      background: var(--accent);
      opacity: 0.55;
      margin: 0 auto 2rem;
    }
    .gift-intro {
      font-size: 0.92rem;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 2rem;
    }
    .iban-block {
      text-align: left;
      border-top: 1px solid var(--border-soft);
      margin-bottom: 1.8rem;
    }
    .iban-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.2rem;
      padding: 1rem 0;
      border-bottom: 1px solid var(--border-soft);
    }
    .iban-label {
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.26em;
      color: var(--text-muted);
      font-weight: 500;
      flex-shrink: 0;
    }
    .iban-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: var(--text);
      text-align: right;
    }
    .iban-code {
      font-family: 'Inter', 'SF Mono', 'Menlo', monospace;
      font-size: 0.88rem;
      letter-spacing: 0.04em;
      word-break: break-all;
    }
    .gift-copy-row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.6rem;
    }
    .iban-copied {
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 500;
      opacity: 0;
      transition: opacity var(--ease);
    }
    .iban-copied.visible { opacity: 1; }
    @media (max-width: 540px) {
      .iban-row { flex-direction: column; align-items: flex-start; gap: 0.3rem; }
      .iban-value { text-align: left; }
      .gift-card { padding: 2.2rem 1.6rem; }
    }

    /* ============================================================
       MEMORY (QR upload)
       ============================================================ */
    .memory-block {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 3rem;
      align-items: center;
      max-width: 760px;
      margin: 0 auto;
    }
    .memory-qr-card {
      padding: 1.2rem;
      background: #ffffff;
      border: 1px solid var(--border-soft);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #memory-qr-img {
      width: 220px;
      height: 220px;
      display: block;
    }
    .memory-side {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .memory-lead {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.2rem;
      color: var(--text);
      line-height: 1.5;
    }
    .memory-help {
      font-size: 0.86rem;
      color: var(--text-muted);
      line-height: 1.7;
    }
    .memory-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
      margin-top: 0.4rem;
    }
    @media (max-width: 680px) {
      .memory-block {
        grid-template-columns: 1fr;
        gap: 2rem;
        text-align: center;
      }
      .memory-side { align-items: center; }
      .memory-actions { justify-content: center; }
    }

    /* ============================================================
       CONTACT / RSVP
       ============================================================ */
    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1.1fr;
      gap: 4rem;
      align-items: flex-start;
    }
    .contact-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      color: var(--text);
      margin-bottom: 2rem;
      font-weight: 400;
    }
    .contact-list { display: flex; flex-direction: column; gap: 1.8rem; }
    .contact-entry {
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
      padding-bottom: 1.6rem;
      border-bottom: 1px solid var(--border-soft);
    }

    let currentLang = 'tr';

    function setLang(lang) {
      currentLang = lang;
      const dict = i18n[lang];

      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (dict[key] != null) el.innerHTML = dict[key];
      });

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {
        const key = el.getAttribute('data-i18n-placeholder');
        if (dict[key] != null) el.setAttribute('placeholder', dict[key]);
      });

      document.documentElement.lang = lang;

      document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }


    function toggleMenu() {
      const nav = document.getElementById('mobile-nav');
      const ham = document.getElementById('hamburger');
      const isOpen = nav.classList.toggle('open');
      ham.classList.toggle('open', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }

    function closeMenu() {
      document.getElementById('mobile-nav').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
      document.body.style.overflow = '';
    }

    document.addEventListener('click', e => {
      const nav = document.getElementById('mobile-nav');
      const ham = document.getElementById('hamburger');
      if (nav.classList.contains('open') && !nav.contains(e.target) && !ham.contains(e.target)) {
        closeMenu();
      }
    });


    /* Countdown — target: June 20, 2026 at 14:00 Türkiye time */
    const WEDDING_DATE = new Date('2026-06-20T14:00:00+03:00').getTime();

    function pad(n, w) { return String(n).padStart(w, '0'); }

    function tickCountdown() {
      const diff = WEDDING_DATE - Date.now();

      if (diff <= 0) {
        ['cd-days','cd-hours','cd-minutes','cd-seconds'].forEach(id => {
          document.getElementById(id).textContent = '00';
        });
        return;
      }

      const days    = Math.floor(diff / 86_400_000);
      const hours   = Math.floor((diff % 86_400_000) / 3_600_000);
      const minutes = Math.floor((diff % 3_600_000)  /    60_000);
      const seconds = Math.floor((diff %    60_000)  /     1_000);

      document.getElementById('cd-days').textContent    = pad(days, 2);
      document.getElementById('cd-hours').textContent   = pad(hours, 2);
      document.getElementById('cd-minutes').textContent = pad(minutes, 2);
      document.getElementById('cd-seconds').textContent = pad(seconds, 2);
    }

    tickCountdown();
    setInterval(tickCountdown, 1000);


    const revealObs = new IntersectionObserver(
      entries => {
        entries.forEach(e => {
          if (e.isIntersecting) {
            e.target.classList.add('visible');
            revealObs.unobserve(e.target);
          }
        });
      },
      { threshold: 0.1, rootMargin: '0px 0px -40px 0px' }
    );
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));


    /* ============================================================
       MEMORY / QR
       Reads UPLOAD_URL from /config.js (window.AE_CONFIG).
       ============================================================ */
    const UPLOAD_URL = window.AE_CONFIG.UPLOAD_URL;

    function qrImageUrl(data, size) {
      return "https://api.qrserver.com/v1/create-qr-code/"
        + "?size=" + size + "x" + size
        + "&margin=8"
        + "&ecc=M"
        + "&format=png"
        + "&data=" + encodeURIComponent(data);
    }

    document.getElementById('memory-qr-img').src = qrImageUrl(UPLOAD_URL, 440);
    document.getElementById('memory-open-link').href = UPLOAD_URL;


    function copyIban() {
      const code = document.getElementById('iban-code').textContent.trim();
      const note = document.getElementById('iban-copied');
      const fallback = () => {
        const ta = document.createElement('textarea');
        ta.value = code;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (_) {}
        document.body.removeChild(ta);
      };
      const showCopied = () => {
        note.classList.add('visible');
        setTimeout(() => note.classList.remove('visible'), 2400);
      };
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(code).then(showCopied, () => { fallback(); showCopied(); });
      } else {
        fallback();
        showCopied();
      }
    }


    function handleRsvp(e) {
      e.preventDefault();
      const form    = document.getElementById('rsvp-form');
      const success = document.getElementById('form-success');
      form.style.display    = 'none';
      success.style.display = 'block';
