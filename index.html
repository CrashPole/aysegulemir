<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ayşegül & Emir Kaan — 20.06.2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:          #0b0b0b;
      --bg-alt:      #101010;
      --card-bg:     #161616;
      --card-hover:  #1c1c1c;
      --text:        #f0ebe0;
      --text-muted:  #8a7e72;
      --accent:      #c9a84c;
      --accent-lt:   #e0bc5f;
      --accent-dim:  rgba(201, 168, 76, 0.18);
      --border:      rgba(201, 168, 76, 0.15);
      --header-h:    72px;
      --radius:      14px;
      --ease:        0.36s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; font-size: 16px; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-weight: 300;
      line-height: 1.75;
      overflow-x: hidden;
    }
    a { color: inherit; text-decoration: none; }
    ul { list-style: none; }
    section { scroll-margin-top: var(--header-h); }
    .script { font-family: 'Great Vibes', cursive; }
    .section-heading {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(2.6rem, 6vw, 4.2rem);
      color: var(--accent);
      text-align: center;
      line-height: 1.15;
      margin-bottom: 0.4rem;
    }
    .section-sub {
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 0.3em;
      font-size: 0.65rem;
      color: var(--text-muted);
      margin-bottom: 4rem;
      font-weight: 400;
    }
    .ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      margin-bottom: 0.8rem;
    }
    .ornament::before, .ornament::after {
      content: '';
      display: block;
      width: 55px;
      height: 1px;
      background: var(--border);
    }
    .ornament-icon { color: var(--accent); font-size: 0.85rem; }
    section { padding: 110px 0; position: relative; }
    .container { width: min(1120px, 92vw); margin: 0 auto; }
    .alt-bg { background: var(--bg-alt); }
    .reveal {
      opacity: 0;
      transform: translateY(42px);
      transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1), transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .reveal.visible { opacity: 1; transform: translateY(0); }
    .reveal-d1 { transition-delay: 0.1s; }
    .reveal-d2 { transition-delay: 0.22s; }
    .reveal-d3 { transition-delay: 0.34s; }
    .reveal-d4 { transition-delay: 0.46s; }
    .reveal-d5 { transition-delay: 0.58s; }
    .site-header {
      position: fixed;
      inset-block-start: 0;
      inset-inline: 0;
      height: var(--header-h);
      z-index: 1000;
      background: rgba(11, 11, 11, 0.82);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--border);
      transition: background var(--ease);
    }
    .header-inner {
      width: min(1200px, 96vw);
      margin: 0 auto;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
    }
    .header-logo {
      font-family: 'Great Vibes', cursive;
      font-size: 1.85rem;
      color: var(--accent);
      white-space: nowrap;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }
    .site-nav { display: flex; align-items: center; gap: 2.4rem; }
    .site-nav a {
      font-size: 0.66rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-muted);
      transition: color var(--ease);
      position: relative;
      padding-bottom: 2px;
    }
    .site-nav a::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width var(--ease);
    }
    .site-nav a:hover { color: var(--text); }
    .site-nav a:hover::after { width: 100%; }
    .lang-toggle {
      display: flex;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .lang-btn {
      padding: 6px 14px;
      font-size: 0.62rem;
      font-weight: 600;
      font-family: 'Montserrat', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-muted);
      transition: background var(--ease), color var(--ease);
    }
    .lang-btn.active { background: var(--accent); color: #0b0b0b; }
    .hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 6px 4px;
      background: none;
      border: none;
    }
    .hamburger span {
      display: block;
      width: 22px;
      height: 1.5px;
      background: var(--text);
      border-radius: 2px;
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; transform: scaleX(0); }
    .hamburger.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }
    .mobile-nav {
      display: none;
      position: fixed;
      top: var(--header-h);
      left: 0; right: 0;
      background: rgba(10, 10, 10, 0.97);
      backdrop-filter: blur(18px);
      padding: 2.5rem 2rem;
      z-index: 999;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      border-bottom: 1px solid var(--border);
      opacity: 0;
      transition: opacity 0.25s ease, transform 0.25s ease;
      pointer-events: none;
    }
    .mobile-nav.open { display: flex; opacity: 1; pointer-events: all; }
    .mobile-nav a {
      font-size: 0.8rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: var(--text-muted);
      transition: color var(--ease);
    }
    .mobile-nav a:hover { color: var(--accent); }
    #hero {
      position: relative;
      height: 100svh;
      min-height: 620px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 0;
      scroll-margin-top: 0;
    }
    #star-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }
    .hero-vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 50%, transparent 0%, rgba(11,11,11,0.6) 60%, rgba(11,11,11,0.92) 100%),
        linear-gradient(to bottom, rgba(11,11,11,0.5) 0%, transparent 30%, transparent 70%, rgba(11,11,11,0.8) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.9rem;
      padding: 0 1.5rem;
      animation: heroFadeIn 1.6s ease forwards;
    }
    @keyframes heroFadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .hero-eyebrow { text-transform: uppercase; letter-spacing: 0.42em; font-size: 0.6rem; color: var(--accent); font-weight: 500; }
    .hero-names {
      font-family: 'Great Vibes', cursive;
      font-size: clamp(3.8rem, 12vw, 8.5rem);
      line-height: 1.08;
      color: var(--text);
      text-shadow: 0 2px 60px rgba(201, 168, 76, 0.2), 0 0 120px rgba(201, 168, 76, 0.08);
    }
    .hero-amp { color: var(--accent); }
    .hero-subtitle { font-size: 0.66rem; text-transform: uppercase; letter-spacing: 0.38em; color: var(--text-muted); font-weight: 400; }
    .hero-date-row { display: flex; align-items: center; gap: 1.4rem; margin-top: 0.3rem; }
    .hero-date-row::before, .hero-date-row::after { content: ''; display: block; width: 48px; height: 1px; background: rgba(201,168,76,0.3); }
    .hero-date { font-size: 0.78rem; letter-spacing: 0.3em; color: var(--accent); font-weight: 500; }
    .hero-location { font-size: 0.64rem; letter-spacing: 0.28em; color: var(--text-muted); text-transform: uppercase; }
    .scroll-cue {
      position: absolute; bottom: 2.8rem; left: 50%; transform: translateX(-50%);
      z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 6px;
      animation: scrollBounce 2.2s ease-in-out infinite; opacity: 0.5;
    }
    .scroll-cue-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--accent); }
    .scroll-cue-line { width: 1px; height: 36px; background: linear-gradient(to bottom, var(--accent), transparent); }
    @keyframes scrollBounce {
      0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.5; }
      50%       { transform: translateX(-50%) translateY(7px); opacity: 0.8; }
    }
    .countdown-wrap { display: flex; align-items: flex-start; justify-content: center; flex-wrap: wrap; gap: 0.6rem 1.6rem; margin: 0 0 4rem; }
    .cd-unit { display: flex; flex-direction: column; align-items: center; gap: 0.35rem; min-width: 88px; }
    .cd-number { font-family: 'Great Vibes', cursive; font-size: clamp(3.2rem, 9vw, 5.8rem); color: var(--accent); line-height: 1; min-width: 1.2ch; text-align: center; }
    .cd-label { font-size: 0.57rem; text-transform: uppercase; letter-spacing: 0.28em; color: var(--text-muted); font-weight: 500; }
    .cd-sep { font-family: 'Great Vibes', cursive; font-size: 3.8rem; color: var(--accent-dim); line-height: 1; padding-top: 0.5rem; user-select: none; }
    .timeline-wrap { max-width: 560px; margin: 0 auto; position: relative; padding-left: 1.8rem; }
    .timeline-wrap::before { content: ''; position: absolute; left: 0; top: 10px; bottom: 10px; width: 1px; background: linear-gradient(to bottom, transparent, var(--border) 10%, var(--border) 90%, transparent); }
    .tl-item { position: relative; padding: 0 0 2.8rem 1.8rem; }
    .tl-item:last-child { padding-bottom: 0; }
    .tl-dot { position: absolute; left: -5px; top: 7px; width: 11px; height: 11px; border-radius: 50%; border: 2px solid var(--accent); background: var(--bg-alt); transition: background var(--ease); }
    .tl-item:hover .tl-dot { background: var(--accent); }
    .tl-time { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.22em; color: var(--accent); font-weight: 600; margin-bottom: 0.25rem; }
    .tl-title { font-family: 'Great Vibes', cursive; font-size: 1.8rem; color: var(--text); line-height: 1.2; margin-bottom: 0.3rem; }
    .tl-desc { font-size: 0.8rem; color: var(--text-muted); line-height: 1.75; }
    .dir-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.8rem; margin-bottom: 2.8rem; }
    .dir-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.2rem; transition: border-color var(--ease), transform var(--ease), box-shadow var(--ease); }
    .dir-card:hover { border-color: rgba(201,168,76,0.38); transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,0.35); }
    .dir-icon { font-size: 2rem; margin-bottom: 1rem; line-height: 1; }
    .dir-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.24em; color: var(--accent); font-weight: 600; margin-bottom: 0.9rem; }
    .dir-text { font-size: 0.8rem; color: var(--text-muted); line-height: 1.85; }
    .map-box { width: 100%; height: 380px; background: var(--card-bg); border: 2px dashed rgba(201,168,76,0.2); border-radius: var(--radius); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.2rem; color: var(--text-muted); text-align: center; padding: 2rem; }
    .map-box-icon { font-size: 2.8rem; opacity: 0.35; }
    .map-box p { font-size: 0.75rem; line-height: 1.8; opacity: 0.55; max-width: 340px; letter-spacing: 0.06em; }
    .hotel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.6rem; }
    .hotel-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: transform var(--ease), border-color var(--ease), box-shadow var(--ease); }
    .hotel-card:hover { transform: translateY(-8px); border-color: rgba(201,168,76,0.38); box-shadow: 0 24px 50px rgba(0,0,0,0.45); }
    .hotel-thumb { height: 150px; display: flex; align-items: center; justify-content: center; font-size: 3rem; flex-shrink: 0; }
    .hotel-thumb-1 { background: linear-gradient(135deg, #0d1a2a, #1a2d3d); }
    .hotel-thumb-2 { background: linear-gradient(135deg, #0d1a0d, #1a2d1a); }
    .hotel-thumb-3 { background: linear-gradient(135deg, #1a1510, #2a2015); }
    .hotel-body { padding: 1.6rem; display: flex; flex-direction: column; flex-grow: 1; gap: 0.55rem; }
    .hotel-stars { color: var(--accent); font-size: 0.7rem; letter-spacing: 0.1em; }
    .hotel-name { font-family: 'Great Vibes', cursive; font-size: 1.55rem; color: var(--text); line-height: 1.2; }
    .hotel-loc { font-size: 0.62rem; text-transform: uppercase; letter-spacing: 0.18em; color: var(--accent); font-weight: 600; }
    .hotel-desc { font-size: 0.77rem; color: var(--text-muted); flex-grow: 1; line-height: 1.75; }
    .hotel-price { font-size: 0.7rem; color: var(--text-muted); font-style: italic; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; padding: 11px 24px; font-size: 0.64rem; font-weight: 600; font-family: 'Montserrat', sans-serif; text-transform: uppercase; letter-spacing: 0.2em; border-radius: 100px; cursor: pointer; border: none; transition: all var(--ease); white-space: nowrap; }
    .btn-block { width: 100%; margin-top: 1.2rem; }
    .btn-outline { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
    .btn-outline:hover { background: var(--accent); color: #0b0b0b; box-shadow: 0 6px 20px rgba(201,168,76,0.22); }
    .btn-filled { background: var(--accent); color: #0b0b0b; }
    .btn-filled:hover { background: var(--accent-lt); transform: translateY(-2px); box-shadow: 0 10px 26px rgba(201,168,76,0.28); }
    .btn-lg { padding: 14px 42px; font-size: 0.7rem; }
    .registry-center { max-width: 680px; margin: 0 auto; text-align: center; }
    .registry-icon { font-size: 3.2rem; margin-bottom: 1.8rem; opacity: 0.65; line-height: 1; }
    .registry-text { font-size: 0.86rem; color: var(--text-muted); line-height: 1.95; margin-bottom: 2.8rem; }
    .contact-grid { display: grid; grid-template-columns: 1fr 1.45fr; gap: 4.5rem; align-items: start; }
    .contact-heading { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--accent); margin-bottom: 2rem; }
    .contact-list { display: flex; flex-direction: column; gap: 1.5rem; }
    .contact-entry { display: flex; align-items: flex-start; gap: 1.1rem; }
    .contact-entry-icon { font-size: 1.05rem; flex-shrink: 0; margin-top: 3px; opacity: 0.65; }
    .contact-entry-label { font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.22em; color: var(--accent); font-weight: 600; margin-bottom: 0.2rem; }
    .contact-entry-val { font-size: 0.82rem; color: var(--text-muted); line-height: 1.6; }
    .contact-entry-val a { transition: color var(--ease); }
    .contact-entry-val a:hover { color: var(--accent); }
    .rsvp-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 2.8rem; }
    .rsvp-card-title { font-family: 'Great Vibes', cursive; font-size: 2.4rem; color: var(--text); margin-bottom: 0.2rem; line-height: 1.2; }
    .rsvp-card-sub { font-size: 0.7rem; color: var(--text-muted); margin-bottom: 2rem; letter-spacing: 0.04em; }
    .form-group { margin-bottom: 1.5rem; }
    .form-label { display: block; font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.22em; color: var(--accent); font-weight: 600; margin-bottom: 0.5rem; }
    .form-control { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(201,168,76,0.14); border-radius: 9px; padding: 12px 16px; color: var(--text); font-family: 'Montserrat', sans-serif; font-size: 0.82rem; font-weight: 300; transition: border-color var(--ease), background var(--ease); outline: none; -webkit-appearance: none; appearance: none; }
    .form-control:focus { border-color: rgba(201,168,76,0.55); background: rgba(201,168,76,0.04); }
    .form-control::placeholder { color: var(--text-muted); opacity: 0.45; }
    textarea.form-control { min-height: 100px; resize: vertical; }
    select.form-control { cursor: pointer; }
    select.form-control option { background: #1a1a1a; color: var(--text); }
    .form-note { font-size: 0.68rem; color: var(--text-muted); text-align: center; margin-top: 1rem; opacity: 0.7; }
    .form-success-msg { display: none; text-align: center; padding: 2rem 1rem; }
    .form-success-title { font-family: 'Great Vibes', cursive; font-size: 2.8rem; color: var(--accent); margin-bottom: 0.5rem; }
    .form-success-sub { font-size: 0.78rem; color: var(--text-muted); letter-spacing: 0.08em; }
    .site-footer { padding: 3.5rem 0; text-align: center; border-top: 1px solid var(--border); }
    .footer-names { font-family: 'Great Vibes', cursive; font-size: 2.2rem; color: var(--accent); margin-bottom: 0.5rem; }
    .footer-detail { font-size: 0.62rem; color: var(--text-muted); letter-spacing: 0.24em; text-transform: uppercase; }
    @media (max-width: 960px) {
      .hotel-grid { grid-template-columns: 1fr 1fr; }
      .contact-grid { grid-template-columns: 1fr; gap: 3.5rem; }
      .dir-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
      :root { --header-h: 64px; }
      .site-nav { display: none; }
      .hamburger { display: flex; }
      section { padding: 80px 0; }
      .hotel-grid { grid-template-columns: 1fr; max-width: 420px; margin-left: auto; margin-right: auto; }
      .countdown-wrap { gap: 0.4rem 1rem; }
      .cd-sep { font-size: 2.8rem; }
      .timeline-wrap { padding-left: 1.4rem; }
      .rsvp-card { padding: 2rem 1.6rem; }
    }
    @media (max-width: 480px) {
      .hero-names { font-size: clamp(3.2rem, 15vw, 5rem); }
      .hero-date-row::before, .hero-date-row::after { width: 28px; }
      .lang-btn { padding: 5px 11px; font-size: 0.58rem; }
      .cd-number { font-size: clamp(2.6rem, 12vw, 3.8rem); }
      .cd-unit { min-width: 68px; }
      .cd-sep { font-size: 2.2rem; }
      .section-heading { font-size: clamp(2.2rem, 8vw, 3rem); }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div class="header-logo">A &amp; E</div>
      <nav class="site-nav" role="navigation">
        <a href="#wedding-day"   data-i18n="nav_wedding_day"></a>
        <a href="#getting-there" data-i18n="nav_getting_there"></a>
        <a href="#accommodation" data-i18n="nav_accommodation"></a>
        <a href="#registry"      data-i18n="nav_registry"></a>
        <a href="#contact"       data-i18n="nav_contact"></a>
      </nav>
      <div style="display:flex;align-items:center;gap:0.9rem;">
        <div class="lang-toggle" role="group" aria-label="Language">
          <button class="lang-btn active" id="btn-tr" onclick="setLang('tr')">TR</button>
          <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
        </div>
        <button class="hamburger" id="hamburger" aria-label="Toggle menu" onclick="toggleMenu()">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
  </header>
  <nav class="mobile-nav" id="mobile-nav" role="navigation">
    <a href="#wedding-day"   data-i18n="nav_wedding_day"   onclick="closeMenu()"></a>
    <a href="#getting-there" data-i18n="nav_getting_there" onclick="closeMenu()"></a>
    <a href="#accommodation" data-i18n="nav_accommodation" onclick="closeMenu()"></a>
    <a href="#registry"      data-i18n="nav_registry"      onclick="closeMenu()"></a>
    <a href="#contact"       data-i18n="nav_contact"       onclick="closeMenu()"></a>
  </nav>
  <section id="hero">
    <canvas id="star-canvas" aria-hidden="true"></canvas>
    <div class="hero-vignette" aria-hidden="true"></div>
    <div class="hero-content">
      <p class="hero-eyebrow" data-i18n="hero_eyebrow"></p>
      <h1 class="hero-names">Ayşegül <span class="hero-amp">&amp;</span><br>Emir Kaan</h1>
      <p class="hero-subtitle" data-i18n="hero_subtitle"></p>
      <div class="hero-date-row"><span class="hero-date">20 · 06 · 2026</span></div>
      <p class="hero-location">Güzelbahçe, İzmir</p>
    </div>
    <div class="scroll-cue" aria-hidden="true"><div class="scroll-cue-dot"></div><div class="scroll-cue-line"></div></div>
  </section>
  <section id="wedding-day" class="alt-bg">
    <div class="container">
      <h2 class="section-heading reveal" data-i18n="wd_title"></h2>

    let currentLang = 'tr';
    function setLang(lang) {
      currentLang = lang;
      const dict = i18n[lang];

      document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.getAttribute('data-i18n-placeholder'); if (dict[k] != null) el.setAttribute('placeholder', dict[k]); });
      document.documentElement.lang = lang;
      document.getElementById('btn-tr').classList.toggle('active', lang === 'tr');
      document.getElementById('btn-en').classList.toggle('active', lang === 'en');
    }
    function toggleMenu() {
      const nav = document.getElementById('mobile-nav'), ham = document.getElementById('hamburger');
      const isOpen = nav.classList.toggle('open');
      ham.classList.toggle('open', isOpen);
      document.body.style.overflow = isOpen ? 'hidden' : '';
    }
    function closeMenu() {
      document.getElementById('mobile-nav').classList.remove('open');
      document.getElementById('hamburger').classList.remove('open');
      document.body.style.overflow = '';
    }
    document.addEventListener('click', e => {
      const nav = document.getElementById('mobile-nav'), ham = document.getElementById('hamburger');
      if (nav.classList.contains('open') && !nav.contains(e.target) && !ham.contains(e.target)) closeMenu();
    });
    const WEDDING_DATE = new Date('2026-06-20T14:00:00+03:00').getTime();
    function pad(n, w) { return String(n).padStart(w, '0'); }
    function tickCountdown() {
      const diff = WEDDING_DATE - Date.now();
      if (diff <= 0) { ['cd-days','cd-hours','cd-minutes','cd-seconds'].forEach(id => document.getElementById(id).textContent = '00'); return; }
      document.getElementById('cd-days').textContent    = pad(Math.floor(diff / 86400000), 3);
      document.getElementById('cd-hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000), 2);
      document.getElementById('cd-minutes').textContent = pad(Math.floor((diff % 3600000) / 60000), 2);
      document.getElementById('cd-seconds').textContent = pad(Math.floor((diff % 60000) / 1000), 2);
    }
    tickCountdown(); setInterval(tickCountdown, 1000);
    (function starfield() {
      const canvas = document.getElementById('star-canvas'), ctx = canvas.getContext('2d');
      let stars = [], W = 0, H = 0;
      function resize() { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; buildStars(); }
      function buildStars() { const n = Math.round((W * H) / 4200); stars = Array.from({length: n}, () => ({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.3+0.15, base: Math.random()*0.65+0.15, speed: Math.random()*0.0025+0.0008, phase: Math.random()*Math.PI*2 })); }
      function render(ts) { ctx.fillStyle='#0b0b0b'; ctx.fillRect(0,0,W,H); for(const s of stars){const a=s.base*(0.55+0.45*Math.sin(ts*s.speed+s.phase)); ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fillStyle=`rgba(255,248,220,${a})`; ctx.fill();} requestAnimationFrame(render); }
      new ResizeObserver(()=>resize()).observe(canvas.parentElement); resize(); requestAnimationFrame(render);
    })();
    const revealObs = new IntersectionObserver(entries => entries.forEach(e => { if(e.isIntersecting){e.target.classList.add('visible'); revealObs.unobserve(e.target);} }), {threshold:0.1, rootMargin:'0px 0px -40px 0px'});
    document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));
    function handleRsvp(e) { e.preventDefault(); document.getElementById('rsvp-form').style.display='none'; document.getElementById('form-success').style.display='block'; }
